<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- T-shirt shape -->
  <path d="M100,60 L60,80 L20,120 L60,140 L80,110 L80,440 L320,440 L320,110 L340,140 L380,120 L340,80 L300,60 L260,90 C240,110 160,110 140,90 Z" fill="url(#shirtGrad)" stroke="#333" stroke-width="2"/>

  <!-- Road sign - diamond shape -->
  <g transform="translate(200,200)">
    <!-- Diamond background -->
    <rect x="-70" y="-70" width="140" height="140" rx="8" transform="rotate(45)" fill="#FFD700" stroke="#222" stroke-width="3"/>
    <!-- Sign border -->
    <rect x="-60" y="-60" width="120" height="120" rx="6" transform="rotate(45)" fill="none" stroke="#222" stroke-width="2"/>

    <!-- Arrow pointing right -->
    <g transform="translate(0,-10)">
      <!-- Curved arrow body -->
      <path d="M-35,15 Q-35,-20 0,-20 L25,-20" fill="none" stroke="#222" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Arrow head -->
      <polygon points="20,-35 40,-20 20,-5" fill="#222"/>
    </g>

    <!-- SLOWER TRAFFIC text -->
    <text x="0" y="38" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#222" text-anchor="middle" letter-spacing="0.5">SLOWER TRAFFIC</text>
    <text x="0" y="52" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#222" text-anchor="middle" letter-spacing="0.5">KEEP RIGHT</text>
  </g>

  <!-- Top text -->
  <text x="200" y="135" font-family="Arial Black, Impact, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">STAY OUT OF</text>
  <text x="200" y="158" font-family="Arial Black, Impact, sans-serif" font-size="22" font-weight="900" fill="#FF4444" text-anchor="middle" letter-spacing="1">THE FAST LANE!</text>

  <!-- Bottom URL -->
  <text x="200" y="340" font-family="Arial Black, Impact, sans-serif" font-size="14" font-weight="900" fill="#FF4444" text-anchor="middle" letter-spacing="1.5">YOUSUCK</text>
  <text x="200" y="358" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#AAAAAA" text-anchor="middle" letter-spacing="1">at</text>
  <text x="200" y="376" font-family="Arial Black, Impact, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">DRIVING.net</text>
</svg>