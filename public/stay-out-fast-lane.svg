<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 580" width="500" height="580">

  <!-- Top text -->
  <text x="250" y="50" font-family="Impact, Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">STAY OUT OF</text>
  <text x="250" y="98" font-family="Impact, Arial Black, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">THE FAST LANE!</text>

  <!-- Website URL -->
  <text x="250" y="126" font-family="Impact, Arial Black, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="4" opacity="0.6">YOUSUCKATDRIVING.NET</text>

  <!-- Actual R4-3 road sign: white rectangle, black border, text only -->
  <g transform="translate(250, 365)">
    <!-- White sign background -->
    <rect x="-105" y="-125" width="210" height="250" rx="4" fill="#FFFFFF"/>
    <!-- Black inner border -->
    <rect x="-95" y="-115" width="190" height="230" rx="3" fill="none" stroke="#000000" stroke-width="2.5"/>

    <!-- SLOWER TRAFFIC KEEP RIGHT -->
    <text x="0" y="-52" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#000000" text-anchor="middle">SLOWER</text>
    <text x="0" y="-17" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#000000" text-anchor="middle">TRAFFIC</text>
    <text x="0" y="18" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#000000" text-anchor="middle">KEEP</text>
    <text x="0" y="53" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#000000" text-anchor="middle">RIGHT</text>
  </g>

</svg>